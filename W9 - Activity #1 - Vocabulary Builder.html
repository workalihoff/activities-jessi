<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Builder — Week 9: Mid-Year Review | English with Ali</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F6E56;--teal-mid:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;
  --terra:#C4553A;--terra-light:#F5EAE7;
  --cream:#F7F5F0;--cream-dark:#EDE9E2;
  --text:#1A1A18;--text2:#4A4A47;--text3:#888780;
  --border:#E0DED8;--card:#fff;
  --green-bg:#EAF3DE;--green-t:#27500A;--green-b:#3B6D11;
  --red-bg:#FCEBEB;--red-t:#791F1F;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --blue-bg:#E6F1FB;--blue-t:#0C447C;
}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

.topbar{background:var(--teal);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Raleway',sans-serif;font-size:16px;font-weight:700;color:#fff}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-bar-bg{width:120px;height:6px;background:rgba(255,255,255,.2);border-radius:3px}
.prog-bar-fill{height:6px;border-radius:3px;background:#fff;transition:width .4s ease}
.prog-label{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap}

.info-bar{background:#fff;border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:10px;justify-content:center}
.info-bar label{font-size:12.5px;color:var(--text3);font-weight:600}
.info-bar input{border:1px solid var(--border);border-radius:8px;padding:.35rem .7rem;font-size:13px;font-family:'Lato',sans-serif;width:200px}
.info-bar input:focus{outline:none;border-color:var(--teal-mid)}

.print-header{display:none}

.shell{max-width:780px;margin:0 auto;padding:2rem 1rem 5rem}
.section-intro{text-align:center;padding:1.5rem 0 1.5rem}
.section-intro h2{font-family:'Raleway',sans-serif;font-size:22px;font-weight:700;color:var(--teal);margin-bottom:.4rem}
.section-intro p{font-size:14px;color:var(--text3);max-width:520px;margin:0 auto}

.phase-nav{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.phase-tab{flex:1;padding:.75rem .5rem;text-align:center;cursor:pointer;border:none;background:transparent;font-family:'Lato',sans-serif;font-size:13px;font-weight:600;color:var(--text3);transition:all .2s;border-right:1px solid var(--border)}
.phase-tab:last-child{border-right:none}
.phase-tab.active{background:var(--teal);color:#fff}
.phase-tab .tab-num{display:block;font-size:18px;font-weight:700;margin-bottom:2px}
.phase-tab .tab-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em}

.review-strip-wrap{margin-bottom:1.75rem}
.review-strip-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.6rem}
.review-strip{display:flex;flex-wrap:wrap;gap:8px}
.review-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.55rem .8rem;flex:1 1 215px}
.review-chip .rc-word{font-family:'Raleway',sans-serif;font-weight:700;color:var(--teal-dark);font-size:13px;margin-bottom:1px}
.review-chip .rc-def{font-size:11.5px;color:var(--text3);line-height:1.4}

.new-words-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--terra);margin:1.5rem 0 .6rem}

.word-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:1.25rem;overflow:hidden}
.wc-header{padding:1.25rem 1.5rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;cursor:pointer;user-select:none}
.wc-word{font-family:'Raleway',sans-serif;font-size:22px;font-weight:700;color:var(--teal);margin-bottom:3px}
.wc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wc-pos{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:10px;background:var(--teal-light);color:var(--teal-dark)}
.wc-phonetic{font-size:13px;color:var(--text3);font-style:italic}
.wc-toggle{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;color:var(--text3)}
.wc-body{padding:0 1.5rem 1.5rem;border-top:1px solid var(--border)}
.wc-def-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:.9rem 0 .35rem}
.wc-def{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:.75rem}
.confusion-box{background:var(--amber-bg);border-left:3px solid #BA7517;border-radius:0 8px 8px 0;padding:.7rem 1rem;margin:.75rem 0}
.confusion-box .cb-title{font-size:11px;font-weight:700;color:var(--amber-t);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.confusion-box p{font-size:13px;color:var(--amber-t);line-height:1.55}
.example-list{display:flex;flex-direction:column;gap:.5rem;margin-top:.25rem}
.ex-item{background:var(--cream);border-radius:8px;padding:.65rem .9rem;font-size:13px;color:var(--text2);line-height:1.5;border-left:3px solid var(--teal-mid)}
.ex-item strong{color:var(--teal-dark);font-weight:700}
.colloc-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:.25rem}
.colloc-chip{padding:5px 12px;border-radius:16px;font-size:12px;background:var(--teal-light);color:var(--teal-dark);font-weight:600;border:1px solid #9FE1CB}
.tip-box{background:var(--blue-bg);border-radius:8px;padding:.65rem .9rem;margin-top:.75rem;font-size:13px;color:var(--blue-t);line-height:1.5}

.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
.quiz-num{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}
.quiz-situation{background:var(--teal-light);border-left:3px solid var(--teal-mid);border-radius:0 8px 8px 0;padding:.6rem .9rem;font-size:13px;color:var(--teal-dark);margin-bottom:1rem}
.quiz-prompt{font-size:15px;font-weight:600;color:var(--text);margin-bottom:1rem;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:7px}
.q-opt{display:flex;align-items:flex-start;gap:10px;padding:.7rem 1rem;border:1px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;text-align:left;width:100%;font-family:'Lato',sans-serif}
.q-opt:hover{border-color:#9FE1CB;background:var(--teal-light)}
.q-opt.correct,.q-opt.revealed{border-color:var(--green-b);background:var(--green-bg)}
.q-opt.incorrect{border-color:#E24B4A;background:var(--red-bg)}
.q-letter{min-width:22px;height:22px;border-radius:50%;border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-opt.correct .q-letter,.q-opt.revealed .q-letter{background:var(--green-b);border-color:var(--green-b);color:#fff}
.q-opt.incorrect .q-letter{background:#E24B4A;border-color:#E24B4A;color:#fff}
.q-text{font-size:14px;color:var(--text);line-height:1.5}
.quiz-feedback{margin-top:.75rem;padding:.65rem .9rem;border-radius:8px;font-size:13px;line-height:1.5;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:var(--green-bg);color:var(--green-t);border-left:3px solid var(--green-b)}
.quiz-feedback.incorrect{background:var(--red-bg);color:var(--red-t);border-left:3px solid #E24B4A}

.write-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
.write-word-tag{display:inline-block;font-family:'Raleway',sans-serif;font-size:18px;font-weight:700;color:var(--teal);background:var(--teal-light);padding:4px 16px;border-radius:20px;margin-bottom:.75rem;border:1px solid #9FE1CB}
.write-reminder{background:var(--cream);border-radius:8px;padding:.6rem .9rem;font-size:12px;color:var(--text3);margin-bottom:1rem;line-height:1.5}
.write-ta{width:100%;min-height:80px;border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;font-size:14px;color:var(--text);font-family:'Lato',sans-serif;resize:vertical;outline:none;background:var(--cream);line-height:1.6}
.write-ta:focus{border-color:var(--teal-mid);background:#fff}
.print-mirror{display:none}

.export-box{background:var(--teal-light);border:1.5px dashed var(--teal-mid);border-radius:14px;padding:1.4rem;text-align:center;margin:1.5rem 0}
.export-box p{font-size:13px;color:var(--teal-dark);margin-bottom:.8rem}
.export-btn{background:var(--teal);color:#fff;border:none;padding:.7rem 1.6rem;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif}
.export-btn:hover{background:var(--teal-mid)}

.bottom-nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.nav-btn{padding:.6rem 1.4rem;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Lato',sans-serif;border:1px solid var(--border);background:var(--card);color:var(--text)}
.nav-btn:hover{border-color:var(--teal-mid)}
.nav-btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}

@media print{
  .topbar,.info-bar,.phase-nav,.bottom-nav,.export-box{display:none !important}
  #phase-0{display:none !important}
  #phase-1,#phase-2{display:block !important}
  .write-ta{display:none !important}
  .print-mirror{display:block !important;white-space:pre-wrap;border:1px solid #999;border-radius:8px;padding:.6rem .85rem;font-size:12.5px;color:#000;background:#fff;margin-top:.2rem}
  .print-header{display:block !important;padding:0 0 1rem;font-family:'Lato',sans-serif}
  .print-header h1{font-family:'Raleway',sans-serif;font-size:19px;color:#085041;margin-bottom:.3rem}
  .print-header .ph-meta{font-size:12px;color:#444}
  body{background:#fff}
  .shell{padding:1rem 1rem 2rem;max-width:100%}
  .quiz-card,.write-card{box-shadow:none;break-inside:avoid;border:1px solid #ccc}
  .q-opt.correct,.q-opt.revealed,.q-opt.incorrect{border-width:2px !important}
  .section-intro p{display:none}
}
@media(max-width:580px){.shell{padding:1.5rem .75rem 5rem}.wc-word{font-size:18px}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Vocabulary Builder — Week 9</div>
    <div class="topbar-sub">English with Ali · Mid-Year Review Vocabulary</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog" style="width:0%"></div></div>
    <span class="prog-label" id="prog-label">Phase 1 of 3</span>
  </div>
</div>

<div class="info-bar">
  <label for="student-name">Your name:</label>
  <input type="text" id="student-name" placeholder="Jessi">
</div>

<div class="print-header" id="print-header"></div>

<div class="shell">
  <div class="phase-nav">
    <div class="phase-tab active" id="tab-0" onclick="goPhase(0)"><span class="tab-num">1</span><span class="tab-lbl">Learn</span></div>
    <div class="phase-tab" id="tab-1" onclick="goPhase(1)"><span class="tab-num">2</span><span class="tab-lbl">Quiz</span></div>
    <div class="phase-tab" id="tab-2" onclick="goPhase(2)"><span class="tab-num">3</span><span class="tab-lbl">Write</span></div>
  </div>

  <div id="phase-0"></div>
  <div id="phase-1" style="display:none"></div>
  <div id="phase-2" style="display:none"></div>
</div>

<script>
const REVIEW_WORDS = [
  {w:'Due by',d:'A deadline — when something must be finished.'},
  {w:'Due to',d:'Because of — explains a reason.'},
  {w:'Stakeholder',d:'Anyone affected by or interested in a project.'},
  {w:'Escalate',d:'Raise an issue to a higher authority.'},
  {w:'Workflow',d:'The steps a task moves through, start to finish.'},
  {w:'Coordinate',d:'Organize people or tasks so they work together.'},
  {w:'Update (v/n)',d:'To inform someone — or the information itself.'},
  {w:'Manage',d:'Be in charge of, oversee.'},
  {w:'Handle',d:'Deal with, take responsibility for.'},
  {w:'Deliver',d:'Complete and provide a result or output.'},
  {w:'Report to',d:'Who you are accountable to.'},
  {w:'Collaborate',d:'Work together with others.'},
  {w:'Be responsible for',d:'Have a duty or obligation for something.'},
];

const NEW_WORDS = [
  {
    id:'achievement',word:'Achievement',pos:'noun',phonetic:'/əˈtʃiːv.mənt/',
    def:'Something you have successfully completed or accomplished, especially through skill or effort.',
    examples:[
      {text:'One of my biggest <strong>achievements</strong> this year was reducing our report turnaround time by 30%.'},
      {text:'I\'d like to highlight a few key <strong>achievements</strong> from this quarter.'},
      {text:'Her main <strong>achievement</strong> was coordinating the system migration without any downtime.'},
    ],
    collocations:['key achievement','highlight an achievement','list your achievements','proud of an achievement'],
    confusion:'⚠️ "Achievement" (noun, the result) vs. "achieve" (verb, the action). "I achieved this" / "This was my achievement."',
    tip:'💡 Achieve + -ment = the noun version of the result.',
  },
  {
    id:'exceed',word:'Exceed expectations',pos:'phrase',phonetic:'/ɪkˈsiːd ɪkˌspekˈteɪʃənz/',
    def:'To perform better than what was expected or required of you.',
    examples:[
      {text:'My manager said I <strong>exceeded expectations</strong> in the client communication category.'},
      {text:'I want to <strong>exceed expectations</strong> this quarter, not just meet them.'},
      {text:'The team <strong>exceeded expectations</strong> on the migration project timeline.'},
    ],
    collocations:['exceed expectations in [area]','meet vs. exceed expectations','consistently exceed'],
    confusion:'⚠️ "Meet expectations" = did what was asked. "Exceed expectations" = did MORE than was asked. Don\'t confuse the two.',
    tip:'💡 "Exceed" = go past/beyond. Picture stepping over a line — that\'s exceeding it.',
  },
  {
    id:'areas',word:'Areas for improvement',pos:'phrase',phonetic:'/ˈeriəz fər ɪmˈpruːvmənt/',
    def:'Specific aspects of your work or skills that could be developed further — a professional, constructive way to talk about weaknesses.',
    examples:[
      {text:'One <strong>area for improvement</strong> is my response time on urgent requests.'},
      {text:'My manager mentioned a few <strong>areas for improvement</strong> during the review.'},
      {text:'I\'m working on an <strong>area for improvement</strong>: delegating more to my team.'},
    ],
    collocations:['identify areas for improvement','work on an area for improvement','discuss areas for improvement'],
    confusion:'⚠️ Don\'t say "improvement areas" (wrong order) or "bad points" (too informal/negative for a professional review).',
    tip:'💡 This phrase softens criticism — professionals say "areas for improvement," not "weaknesses" or "problems."',
  },
  {
    id:'contribute',word:'Contribute to',pos:'verb phrase',phonetic:'/kənˈtrɪbjuːt tuː/',
    def:'To help produce, support, or be part of achieving a result, often as part of a team.',
    examples:[
      {text:'My work directly <strong>contributed to</strong> the department exceeding its targets.'},
      {text:'She <strong>contributes to</strong> the team by mentoring new hires.'},
      {text:'I\'d like to talk about how I <strong>contributed to</strong> the project\'s success.'},
    ],
    collocations:['contribute to a project/result/success','contribute to the team','directly/significantly contribute'],
    confusion:'⚠️ "Contribute" needs "to" before the noun — "contribute to the success," never "contribute the success."',
    tip:'💡 Think of adding your piece to a shared pot — you "contribute to" something bigger than just you.',
  },
  {
    id:'recognition',word:'Recognition',pos:'noun',phonetic:'/ˌrekɪɡˈnɪʃən/',
    def:'Acknowledgment or praise given for good work, effort, or achievement.',
    examples:[
      {text:'I\'d like more <strong>recognition</strong> for the work I do behind the scenes.'},
      {text:'The team received <strong>recognition</strong> from senior leadership for the successful launch.'},
      {text:'<strong>Recognition</strong> isn\'t just about money — sometimes it\'s just being mentioned in a meeting.'},
    ],
    collocations:['receive recognition','give recognition','recognition for [achievement]','public recognition'],
    confusion:'⚠️ "Recognition" (the acknowledgment) vs. "recognize" (the verb) vs. "recognizable" (adjective) — don\'t mix these forms.',
    tip:'💡 Re- (again) + cognize (know) = to "know again" — i.e., to acknowledge.',
  },
];

const QUIZ = [
  {id:'q1',situation:'Your manager asks why the launch was postponed.',prompt:'Which sentence is correct?',
    options:['The launch was delayed due the technical issue.','The launch was delayed due to a technical issue.','The launch was delayed due by a technical issue.','The launch was delayed for a technical issue.'],
    correct:1,explain:'"Due to" introduces a reason. "Due by" is for deadlines, not explanations.'},
  {id:'q2',situation:'You want to describe one specific thing you did well this year for your performance review.',prompt:'Which word best fits?',
    options:['achievement','workflow','stakeholder','escalate'],
    correct:0,explain:'"Achievement" = a specific success or accomplishment — perfect for review conversations.'},
  {id:'q3',situation:'Your manager says you did more than what was required this quarter.',prompt:'How would you describe this professionally?',
    options:['I met expectations.','I exceeded expectations.','I escalated expectations.','I delivered expectations.'],
    correct:1,explain:'"Exceed expectations" means doing more/better than required. "Escalate" and "deliver" don\'t fit this meaning.'},
  {id:'q4',situation:'Your manager points out something you could develop further.',prompt:'Which phrase is the most professional way to describe this?',
    options:['a weakness','a bad point','an area for improvement','a problem I have'],
    correct:2,explain:'"Areas for improvement" is the standard professional phrase — softer and more constructive than "weakness" or "problem."'},
  {id:'q5',situation:'You want to explain how your work helped your team hit its targets.',prompt:'Which sentence is correct?',
    options:['My work contributed the team\'s success.','My work contributed to the team\'s success.','My work contributes for the team\'s success.','My work is contribute to the team\'s success.'],
    correct:1,explain:'"Contribute to" always needs "to" before the noun.'},
  {id:'q6',situation:'You want to ask your manager to be acknowledged for work that often goes unnoticed.',prompt:'Which sentence fits best?',
    options:['I\'d like more recognition for my work.','I\'d like more update for my work.','I\'d like more stakeholder for my work.','I\'d like more workflow for my work.'],
    correct:0,explain:'"Recognition" = acknowledgment/praise. The other words don\'t fit this meaning.'},
  {id:'q7',situation:'You need to tell your manager that a decision is too important for you to make alone.',prompt:'Which sentence uses the correct verb?',
    options:['I need to escalate this decision to you.','I need to achieve this decision to you.','I need to recognize this decision to you.','I need to contribute this decision to you.'],
    correct:0,explain:'"Escalate" (from Week 1) is the right verb for raising an issue or decision to a higher level.'},
];

const WRITE_TASKS = [
  {word:'achievement',prompt:'Write a sentence about one achievement from this quarter — real or realistic. Use "achievement."',hint:'Think about something you finished, improved, or are proud of.'},
  {word:'exceed / meet expectations',prompt:'Write a sentence saying whether you met or exceeded expectations in one area, and why.',hint:'Use "exceed expectations" or "meet expectations."'},
  {word:'areas for improvement',prompt:'Write a sentence naming one area for improvement you\'re working on, and one thing you\'re doing about it.',hint:'Try to also use "contribute to" or "recognition" if it fits naturally.'},
];

let currentPhase = 0;
const quizAnswers = {};
const writeAnswers = {};
let openCards = {};

function updateProgress(){
  const phases = ['Phase 1 of 3 — Learn','Phase 2 of 3 — Quiz','Phase 3 of 3 — Write'];
  const pcts = [33,66,100];
  document.getElementById('prog').style.width = pcts[currentPhase] + '%';
  document.getElementById('prog-label').textContent = phases[currentPhase];
}

function goPhase(n){
  document.getElementById('phase-' + currentPhase).style.display = 'none';
  document.querySelectorAll('.phase-tab').forEach((t,i) => t.classList.toggle('active', i === n));
  currentPhase = n;
  document.getElementById('phase-' + n).style.display = 'block';
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
  if(n === 1) renderQuiz();
  if(n === 2) renderWrite();
}

function renderLearn(){
  const el = document.getElementById('phase-0');
  let html = `<div class="section-intro"><h2>Phase 1 — Learn</h2><p>Quick review of words you already know, then 5 new words tied directly to your mid-year review.</p></div>`;

  html += `<div class="review-strip-wrap"><div class="review-strip-lbl">⏪ Quick Review — words from previous weeks</div><div class="review-strip">`;
  REVIEW_WORDS.forEach(r => { html += `<div class="review-chip"><div class="rc-word">${r.w}</div><div class="rc-def">${r.d}</div></div>`; });
  html += `</div></div>`;

  html += `<div class="new-words-lbl">🆕 New This Week — Mid-Year Review Vocabulary</div>`;

  NEW_WORDS.forEach(w => {
    const isOpen = openCards[w.id] !== false;
    html += `<div class="word-card" id="wcard-${w.id}">
      <div class="wc-header" onclick="toggleCard('${w.id}')">
        <div><div class="wc-word">${w.word}</div>
          <div class="wc-meta"><span class="wc-pos">${w.pos}</span><span class="wc-phonetic">${w.phonetic}</span></div>
        </div>
        <div class="wc-toggle" id="toggle-${w.id}">${isOpen ? '▲' : '▼'}</div>
      </div>
      <div class="wc-body" id="wbody-${w.id}" style="display:${isOpen?'block':'none'}">
        <div class="wc-def-label">Definition</div><div class="wc-def">${w.def}</div>
        <div class="wc-def-label">Examples in context</div><div class="example-list">`;
    w.examples.forEach(ex => { html += `<div class="ex-item">${ex.text}</div>`; });
    html += `</div><div class="wc-def-label">Common collocations</div><div class="colloc-row">`;
    w.collocations.forEach(c => { html += `<span class="colloc-chip">${c}</span>`; });
    html += `</div>
        <div class="confusion-box"><div class="cb-title">⚠️ Don't confuse this</div><p>${w.confusion.replace('⚠️ ','')}</p></div>
        <div class="tip-box">${w.tip}</div>
      </div></div>`;
  });

  html += `<div class="bottom-nav"><span style="font-size:13px;color:var(--text3)">${REVIEW_WORDS.length} reviewed + ${NEW_WORDS.length} new words</span><button class="nav-btn primary" onclick="goPhase(1)">Continue to Quiz →</button></div>`;
  el.innerHTML = html;
}

function toggleCard(id){
  const body = document.getElementById('wbody-' + id);
  const tog = document.getElementById('toggle-' + id);
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  tog.textContent = isOpen ? '▼' : '▲';
  openCards[id] = !isOpen;
}

function renderQuiz(){
  const el = document.getElementById('phase-1');
  let html = `<div class="section-intro"><h2>Phase 2 — Quiz</h2><p>Read each situation and choose the best answer.</p></div>`;

  QUIZ.forEach((q,qi) => {
    const answered = quizAnswers[q.id] !== undefined;
    html += `<div class="quiz-card"><div class="quiz-num">Question ${qi+1} of ${QUIZ.length}</div>
      <div class="quiz-situation"><strong>Situation:</strong> ${q.situation}</div>
      <div class="quiz-prompt">${q.prompt}</div><div class="quiz-options">`;
    q.options.forEach((opt,oi) => {
      let cls = '';
      if(answered){ if(oi === q.correct) cls = 'revealed'; else if(quizAnswers[q.id] === oi) cls = 'incorrect'; }
      html += `<button class="q-opt ${cls}" data-qid="${q.id}" data-oi="${oi}" onclick="answerQuiz(this)"><span class="q-letter">${String.fromCharCode(65+oi)}</span><span class="q-text">${opt}</span></button>`;
    });
    html += `</div>`;
    if(answered){
      const correct = quizAnswers[q.id] === q.correct;
      html += `<div class="quiz-feedback ${correct?'correct':'incorrect'} show">${correct?'✓ ':'✗ '}${q.explain}</div>`;
    }
    html += `</div>`;
  });

  const allDone = Object.keys(quizAnswers).length === QUIZ.length;
  html += `<div class="bottom-nav"><button class="nav-btn" onclick="goPhase(0)">← Back to Learn</button><button class="nav-btn primary" onclick="goPhase(2)" ${allDone?'':'disabled'}>Continue to Write →</button></div>`;
  el.innerHTML = html;
}

function answerQuiz(btn){
  const qid = btn.dataset.qid, oi = parseInt(btn.dataset.oi);
  if(quizAnswers[qid] !== undefined) return;
  quizAnswers[qid] = oi;
  renderQuiz();
}

function renderWrite(){
  const el = document.getElementById('phase-2');
  let html = `<div class="section-intro"><h2>Phase 3 — Write in Context</h2><p>Use the new words in real sentences about your own review.</p></div>`;

  WRITE_TASKS.forEach((task,ti) => {
    const val = writeAnswers[ti] || '';
    html += `<div class="write-card"><span class="write-word-tag">${task.word}</span>
      <div class="write-reminder"><strong>Prompt:</strong> ${task.prompt}</div>
      ${task.hint?`<div style="font-size:12px;color:var(--text3);margin-bottom:.75rem;font-style:italic">💭 ${task.hint}</div>`:''}
      <textarea class="write-ta" id="wta-${ti}" placeholder="Write your sentence here…" oninput="writeAnswers[${ti}]=this.value">${escHtml(val)}</textarea>
      <div class="print-mirror" id="mirror-wta-${ti}"></div>
    </div>`;
  });

  html += `<div class="export-box"><p>📄 Done? Export this whole activity — quiz and written answers — as a clean PDF to submit.</p><button class="export-btn" onclick="exportPDF()">Export to PDF</button></div>`;
  html += `<div class="bottom-nav"><button class="nav-btn" onclick="goPhase(1)">← Back to Quiz</button><button class="nav-btn" onclick="goPhase(0)">Restart ↺</button></div>`;
  el.innerHTML = html;
}

function escHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function exportPDF(){
  const name = document.getElementById('student-name').value.trim() || '_____________';
  const dateStr = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  document.getElementById('print-header').innerHTML = `<h1>Vocabulary Builder — Week 9: Mid-Year Review</h1><div class="ph-meta"><strong>Student:</strong> ${escHtml(name)} &nbsp;|&nbsp; <strong>Date:</strong> ${dateStr}</div>`;

  // Make sure both phases reflect the latest state before printing
  renderQuiz();
  renderWrite();

  // Sync written answers into their print-friendly mirrors (textareas clip overflow when printed; divs don't)
  WRITE_TASKS.forEach((t,ti) => {
    const mirror = document.getElementById('mirror-wta-' + ti);
    if(mirror) mirror.textContent = writeAnswers[ti] && writeAnswers[ti].trim() ? writeAnswers[ti] : '(not answered yet)';
  });

  window.print();
}

renderLearn();
updateProgress();
</script>
</body>
</html>
