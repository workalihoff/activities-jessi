<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Mid-Year Review — Capstone Task | English with Ali</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F6E56;--teal-mid:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;
  --terra:#C4553A;--terra-light:#F5EAE7;
  --cream:#F7F5F0;--cream-dark:#EDE9E2;
  --text:#1A1A18;--text2:#4A4A47;--text3:#888780;
  --border:#E0DED8;--card:#fff;
  --green-bg:#EAF3DE;--green-t:#27500A;--green-b:#3B6D11;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --blue-bg:#E6F1FB;--blue-t:#0C447C;
}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

.topbar{background:var(--teal);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Raleway',sans-serif;font-size:16px;font-weight:700;color:#fff}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-bar-bg{width:120px;height:6px;background:rgba(255,255,255,.2);border-radius:3px}
.prog-bar-fill{height:6px;border-radius:3px;background:#fff;transition:width .4s ease}
.prog-label{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap}

.info-bar{background:#fff;border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:10px;justify-content:center}
.info-bar label{font-size:12.5px;color:var(--text3);font-weight:600}
.info-bar input{border:1px solid var(--border);border-radius:8px;padding:.35rem .7rem;font-size:13px;font-family:'Lato',sans-serif;width:200px}
.info-bar input:focus{outline:none;border-color:var(--teal-mid)}

.print-header{display:none}

.shell{max-width:760px;margin:0 auto;padding:2rem 1.1rem 5rem}
.section-intro{text-align:center;padding:0 0 1.5rem}
.section-intro h2{font-family:'Raleway',sans-serif;font-size:23px;font-weight:700;color:var(--teal);margin-bottom:.4rem}
.section-intro p{font-size:14px;color:var(--text3);max-width:540px;margin:0 auto;line-height:1.55}

.phase-nav{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.phase-tab{flex:1;padding:.75rem .5rem;text-align:center;cursor:pointer;border:none;background:transparent;font-family:'Lato',sans-serif;font-size:13px;font-weight:600;color:var(--text3);transition:all .2s;border-right:1px solid var(--border)}
.phase-tab:last-child{border-right:none}
.phase-tab.active{background:var(--teal);color:#fff}
.phase-tab .tab-num{display:block;font-size:18px;font-weight:700;margin-bottom:2px}
.phase-tab .tab-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em}

.scenario-card{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:0 16px 16px 0;padding:1.2rem 1.4rem;margin-bottom:1.5rem}
.scenario-card .sc-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--teal-dark);margin-bottom:.5rem}
.scenario-card p{font-size:14px;color:var(--teal-dark);line-height:1.6}

.sec-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:.7rem}
.sec-icon{font-size:22px}
.sec-title{font-family:'Raleway',sans-serif;font-size:17px;font-weight:700;color:var(--teal-dark)}
.sec-q{font-size:14px;color:var(--text2);line-height:1.55;margin-bottom:.7rem;font-weight:600}
.sub-prompts{display:flex;flex-direction:column;gap:5px;margin-bottom:.85rem}
.sub-prompt{font-size:12.5px;color:var(--text3);background:var(--cream);border-radius:7px;padding:.4rem .7rem}
.sub-prompt::before{content:'· ';color:var(--teal-mid);font-weight:700}

.outline-ta,.script-ta{width:100%;border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;font-size:13.5px;color:var(--text);font-family:'Lato',sans-serif;resize:vertical;outline:none;background:var(--cream);line-height:1.6}
.outline-ta{min-height:80px}
.script-ta{min-height:110px;font-size:14px;padding:.8rem 1rem;line-height:1.65}
.outline-ta:focus,.script-ta:focus{border-color:var(--teal-mid);background:#fff}
.print-mirror{display:none}

.notes-ref{background:var(--cream-dark);border-radius:8px;padding:.65rem .85rem;margin-bottom:.85rem;font-size:12.5px;color:var(--text2);line-height:1.55;white-space:pre-wrap}
.notes-ref .nr-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);display:block;margin-bottom:3px}
.notes-ref.empty{color:var(--text3);font-style:italic}

.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.6rem}
.chip-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.35rem;display:block}
.chip{background:var(--teal-light);border:1px solid #9FE1CB;border-radius:13px;padding:5px 12px;font-size:12px;color:var(--teal-dark);font-weight:600}
.chip.vocab{background:var(--terra-light);border-color:#E3C2B6;color:var(--terra)}

.grammar-strip{display:flex;flex-direction:column;gap:8px;background:var(--blue-bg);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.5rem}
.grammar-strip .gs-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--blue-t);margin-bottom:.3rem}
.grammar-strip .gs-item{font-size:13px;color:var(--blue-t);line-height:1.5}

.howto-card{background:var(--teal-light);border-left:4px solid var(--teal);border-radius:0 16px 16px 0;padding:1.2rem 1.4rem;margin-bottom:1.25rem}
.howto-card .h-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--teal-dark);margin-bottom:.6rem}
.howto-steps{display:flex;flex-direction:column;gap:6px}
.howto-step{font-size:13px;color:var(--teal-dark);background:#fff;border-radius:8px;padding:.55rem .8rem;border:1px solid #BFE6D7}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.card-title{font-family:'Raleway',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:.8rem}

.checklist{list-style:none}
.checklist li{display:flex;align-items:flex-start;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:13.5px;color:var(--text2);line-height:1.5}
.checklist li:last-child{border-bottom:none}
.chk-box{width:19px;height:19px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .15s;margin-top:1px}
.checklist li.done .chk-box{background:var(--teal);border-color:var(--teal);color:#fff}
.checklist li.done span.ctext{color:var(--teal-dark);font-weight:600}

.preview-box{background:var(--cream);border-radius:10px;padding:1rem 1.2rem;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;max-height:340px;overflow-y:auto;border:1px solid var(--border)}
.preview-box .pb-sec{font-weight:700;color:var(--teal-dark);margin-top:.7rem;display:block}
.preview-box .pb-sec:first-child{margin-top:0}

.export-box{background:var(--teal-light);border:1.5px dashed var(--teal-mid);border-radius:14px;padding:1.4rem;text-align:center;margin:1.5rem 0}
.export-box p{font-size:13px;color:var(--teal-dark);margin-bottom:.5rem}
.export-box .est{font-size:12px;color:var(--teal-mid);margin-bottom:.8rem}
.export-btn{background:var(--teal);color:#fff;border:none;padding:.7rem 1.6rem;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif}
.export-btn:hover{background:var(--teal-mid)}

.bottom-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.75rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.nav-btn{padding:.6rem 1.4rem;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Lato',sans-serif;border:1px solid var(--border);background:var(--card);color:var(--text)}
.nav-btn:hover{border-color:var(--teal-mid)}
.nav-btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}

.closing{text-align:center;font-size:14px;color:var(--teal-dark);font-weight:700;margin-top:1.5rem}

@media print{
  .topbar,.info-bar,.phase-nav,.bottom-nav,.export-box{display:none !important}
  #phase-0,#phase-1{display:block !important}
  #phase-2{display:none !important}
  .outline-ta,.script-ta{display:none !important}
  .print-mirror{display:block !important;white-space:pre-wrap;border:1px solid #999;border-radius:8px;padding:.6rem .85rem;font-size:12.5px;color:#000;background:#fff}
  .print-header{display:block !important;padding:0 0 1rem;font-family:'Lato',sans-serif}
  .print-header h1{font-family:'Raleway',sans-serif;font-size:19px;color:#085041;margin-bottom:.3rem}
  .print-header .ph-meta{font-size:12px;color:#444}
  body{background:#fff}
  .shell{padding:1rem 1.1rem 2rem;max-width:100%}
  .sec-card{box-shadow:none;break-inside:avoid;border:1px solid #ccc}
  .section-intro p,.scenario-card{display:none}
}
@media(max-width:580px){.shell{padding:1.5rem .75rem 5rem}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Mock Mid-Year Review</div>
    <div class="topbar-sub">English with Ali · Capstone Task</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog" style="width:0%"></div></div>
    <span class="prog-label" id="prog-label">Phase 1 of 3</span>
  </div>
</div>

<div class="info-bar">
  <label for="student-name">Your name:</label>
  <input type="text" id="student-name" placeholder="Jessi">
</div>

<div class="print-header" id="print-header"></div>

<div class="shell">
  <div class="phase-nav">
    <div class="phase-tab active" id="tab-0" onclick="goPhase(0)"><span class="tab-num">1</span><span class="tab-lbl">Outline</span></div>
    <div class="phase-tab" id="tab-1" onclick="goPhase(1)"><span class="tab-num">2</span><span class="tab-lbl">Script</span></div>
    <div class="phase-tab" id="tab-2" onclick="goPhase(2)"><span class="tab-num">3</span><span class="tab-lbl">Record</span></div>
  </div>

  <div id="phase-0"></div>
  <div id="phase-1" style="display:none"></div>
  <div id="phase-2" style="display:none"></div>
</div>

<script>
const SECTIONS = [
  {
    title:"Introduction & Role", icon:"👋",
    guidingQ:"What's your role, and who do you work with day to day?",
    subPrompts:["Your title and team","Who you report to","Who works with you regularly"],
    transitions:["I'd like to start by giving a quick overview of my role.","Over the past six months, I've been working as...","I work closely with..."],
    vocab:["stakeholder","coordinate","collaborate","report to"],
    scriptPlaceholder:"I'd like to start by..."
  },
  {
    title:"Key Achievements", icon:"🏆",
    guidingQ:"What are 2–3 things you're proud of this period? Include a number or result if you can.",
    subPrompts:["Achievement 1 + result","Achievement 2 + result","Achievement 3 (optional)"],
    transitions:["One of my proudest achievements this period was...","I'm especially happy with how I...","This resulted in..."],
    vocab:["achievement","exceed expectations","deliver"],
    scriptPlaceholder:"One of my proudest achievements this period was..."
  },
  {
    title:"Contribution to the Team", icon:"🤝",
    guidingQ:"How did your work help your team or company beyond your own individual tasks?",
    subPrompts:["Who or what you helped","How, specifically"],
    transitions:["Beyond my own responsibilities, I also contributed to...","My work directly contributed to...","I helped the team by..."],
    vocab:["contribute to","collaborate","deliver"],
    scriptPlaceholder:"Beyond my individual tasks, I also contributed to..."
  },
  {
    title:"Areas for Improvement", icon:"🌱",
    guidingQ:"What's one thing you want to improve, and what's your plan to get there?",
    subPrompts:["The area to improve","Why it matters","Your plan or next step"],
    transitions:["One area I'd like to keep developing is...","I've identified [X] as an area for improvement.","My plan to work on this is..."],
    vocab:["areas for improvement","exceed expectations","meet expectations"],
    scriptPlaceholder:"One area I'd like to keep developing is..."
  },
  {
    title:"Goals for Next Period", icon:"🎯",
    guidingQ:"What do you want to accomplish in the next review period?",
    subPrompts:["Goal 1","Goal 2","How it connects to team/company priorities"],
    transitions:["Going forward, I'd like to focus on...","My main goal for the next period is to...","I'm planning to..."],
    vocab:["workflow","deliver","manage","escalate"],
    scriptPlaceholder:"Going forward, I'd like to focus on..."
  },
  {
    title:"Closing", icon:"🙏",
    guidingQ:"How do you want to wrap up?",
    subPrompts:["Thank you / acknowledge support","Invite feedback or questions"],
    transitions:["Thank you for taking the time to...","I'd really appreciate any feedback on...","I'm happy to answer any questions."],
    vocab:["recognition"],
    scriptPlaceholder:"Thank you for taking the time to..."
  },
];

let currentPhase = 0;
const outlineAnswers = ["","","","","",""];
const scriptAnswers = ["","","","","",""];

function updateProgress(){
  const phases = ["Phase 1 of 3 — Outline","Phase 2 of 3 — Script","Phase 3 of 3 — Record"];
  const pcts = [33,66,100];
  document.getElementById('prog').style.width = pcts[currentPhase] + '%';
  document.getElementById('prog-label').textContent = phases[currentPhase];
}

function goPhase(n){
  document.getElementById('phase-' + currentPhase).style.display = 'none';
  document.querySelectorAll('.phase-tab').forEach((t,i) => t.classList.toggle('active', i === n));
  currentPhase = n;
  document.getElementById('phase-' + n).style.display = 'block';
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
  if(n === 1) renderScript();
  if(n === 2) renderRecord();
}

function escHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══ PHASE 1 — OUTLINE ═══
function renderOutline(){
  const el = document.getElementById('phase-0');
  let html = `<div class="section-intro"><h2>Phase 1 — Outline</h2><p>Before writing full sentences, just jot down bullet points for each part of your review. Don't worry about grammar yet — just get your ideas down.</p></div>
  <div class="scenario-card"><div class="sc-lbl">Your task</div><p>Prepare your real mid-year review in 3 steps: outline → full script → recorded video. This activity covers Step 1 — the outline.</p></div>`;

  SECTIONS.forEach((s,i) => {
    html += `<div class="sec-card">
      <div class="sec-head"><span class="sec-icon">${s.icon}</span><span class="sec-title">${i+1}. ${s.title}</span></div>
      <div class="sec-q">${s.guidingQ}</div>
      <div class="sub-prompts">`;
    s.subPrompts.forEach(sp => { html += `<div class="sub-prompt">${sp}</div>`; });
    html += `</div>
      <textarea class="outline-ta" id="outline-${i}" placeholder="Bullet points — short phrases are fine" oninput="outlineAnswers[${i}]=this.value">${escHtml(outlineAnswers[i])}</textarea>
      <div class="print-mirror" id="mirror-outline-${i}"></div>
    </div>`;
  });

  html += `<div class="bottom-nav"><span style="font-size:13px;color:var(--text3)">6 sections</span><button class="nav-btn primary" onclick="goPhase(1)">Continue to Script →</button></div>`;
  el.innerHTML = html;
}

// ═══ PHASE 2 — SCRIPT ═══
function renderScript(){
  const el = document.getElementById('phase-1');
  let html = `<div class="section-intro"><h2>Phase 2 — Full Written Script</h2><p>Now turn your notes into complete sentences. Use the transition phrases and vocabulary below if they help.</p></div>

  <div class="grammar-strip">
    <div class="gs-title">Quick grammar reminder</div>
    <div class="gs-item">✓ Explaining WHY → "to + verb" (not "for + verb")</div>
    <div class="gs-item">✓ Mentioning colleagues → he/she + verb-<strong>s</strong>, consistent his/her</div>
    <div class="gs-item">✓ Two full ideas → period or "and," never just a comma</div>
  </div>`;

  SECTIONS.forEach((s,i) => {
    const notes = outlineAnswers[i].trim();
    html += `<div class="sec-card">
      <div class="sec-head"><span class="sec-icon">${s.icon}</span><span class="sec-title">${i+1}. ${s.title}</span></div>
      <div class="notes-ref ${notes?'':'empty'}"><span class="nr-lbl">Your notes from Phase 1</span>${notes ? escHtml(notes) : '(no notes yet — go back to Phase 1 if you want to add some)'}</div>
      <span class="chip-lbl">Transition phrases</span>
      <div class="chip-row">`;
    s.transitions.forEach(t => { html += `<span class="chip">${t}</span>`; });
    html += `</div>
      <span class="chip-lbl">Useful vocabulary</span>
      <div class="chip-row">`;
    s.vocab.forEach(v => { html += `<span class="chip vocab">${v}</span>`; });
    html += `</div>
      <textarea class="script-ta" id="script-${i}" placeholder="${s.scriptPlaceholder}" oninput="scriptAnswers[${i}]=this.value">${escHtml(scriptAnswers[i])}</textarea>
      <div class="print-mirror" id="mirror-script-${i}"></div>
    </div>`;
  });

  const totalWords = scriptAnswers.reduce((sum,t) => sum + (t.trim() ? t.trim().split(/\s+/).length : 0), 0);
  const estMin = (totalWords / 130).toFixed(1);

  html += `<div class="card" style="text-align:center;background:var(--cream-dark)"><p style="font-size:13px;color:var(--text2)">Current script: ~${totalWords} words (around ${estMin} min when spoken aloud) — aim for 3–5 min total.</p></div>`;
  html += `<div class="bottom-nav"><button class="nav-btn" onclick="goPhase(0)">← Back to Outline</button><button class="nav-btn primary" onclick="goPhase(2)">Continue to Record →</button></div>`;
  el.innerHTML = html;
}

// ═══ PHASE 3 — RECORD ═══
function renderRecord(){
  const el = document.getElementById('phase-2');
  let preview = '';
  SECTIONS.forEach((s,i) => {
    preview += `<span class="pb-sec">${i+1}. ${s.title}</span>${scriptAnswers[i].trim() || '(not written yet)'}\n`;
  });

  el.innerHTML = `<div class="section-intro"><h2>Phase 3 — Prepare &amp; Record</h2><p>Your script is ready. Now practice it out loud and record your video.</p></div>

  <div class="howto-card">
    <div class="h-lbl">Before you record</div>
    <div class="howto-steps">
      <div class="howto-step">1. Practice your script out loud 2–3 times.</div>
      <div class="howto-step">2. Use it as a guide, not something to read word-for-word — natural pauses and small changes are normal and good.</div>
      <div class="howto-step">3. Look at the camera, not at your notes, as much as you can.</div>
      <div class="howto-step">4. Aim for about 3–5 minutes total.</div>
    </div>
  </div>

  <div class="howto-card">
    <div class="h-lbl">Recording &amp; submitting</div>
    <div class="howto-steps">
      <div class="howto-step">Record using your phone, in a quiet, well-lit space.</div>
      <div class="howto-step">If the file is large, upload it to Google Drive and share the link, or upload it directly in Classroom.</div>
      <div class="howto-step">If it's small enough, you can also send it on WhatsApp.</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📜 Your full script (for reference while practicing)</div>
    <div class="preview-box">${preview}</div>
  </div>

  <div class="card">
    <div class="card-title">✅ Self-check before you record</div>
    <ul class="checklist" id="checklist">
      <li onclick="toggleCheck(this)"><span class="chk-box">✓</span><span class="ctext">I covered all 6 sections</span></li>
      <li onclick="toggleCheck(this)"><span class="chk-box">✓</span><span class="ctext">I used at least 3 of this week's vocabulary words naturally</span></li>
      <li onclick="toggleCheck(this)"><span class="chk-box">✓</span><span class="ctext">I checked my -s endings and possessives when mentioning colleagues</span></li>
      <li onclick="toggleCheck(this)"><span class="chk-box">✓</span><span class="ctext">I'm close to the 3–5 minute target</span></li>
    </ul>
  </div>

  <p class="closing">Send your video on Classroom, Drive, or WhatsApp 🎬</p>
  <div class="export-box"><p>📄 Done? Export your outline and full script as a clean PDF to submit alongside your video.</p><button class="export-btn" onclick="exportPDF()">Export to PDF</button></div>
  <div class="bottom-nav"><button class="nav-btn" onclick="goPhase(1)">← Back to Script</button><button class="nav-btn" onclick="goPhase(0)">Restart ↺</button></div>`;
}

function toggleCheck(li){ li.classList.toggle('done'); }

function exportPDF(){
  const name = document.getElementById('student-name').value.trim() || '_____________';
  const dateStr = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  document.getElementById('print-header').innerHTML = `<h1>Mock Mid-Year Review — Outline &amp; Script</h1><div class="ph-meta"><strong>Student:</strong> ${escHtml(name)} &nbsp;|&nbsp; <strong>Date:</strong> ${dateStr}</div>`;

  // Make sure both written phases reflect the latest state before printing
  renderOutline();
  renderScript();

  SECTIONS.forEach((s,i) => {
    const om = document.getElementById('mirror-outline-' + i);
    if(om) om.textContent = outlineAnswers[i].trim() ? outlineAnswers[i] : '(no notes yet)';
    const sm = document.getElementById('mirror-script-' + i);
    if(sm) sm.textContent = scriptAnswers[i].trim() ? scriptAnswers[i] : '(not written yet)';
  });

  window.print();
}

renderOutline();
updateProgress();
</script>
</body>
</html>
