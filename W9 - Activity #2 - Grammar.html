<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Builder — Week 9: Purpose &amp; Joining Ideas | English with Ali</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F6E56;--teal-mid:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;
  --terra:#C4553A;--terra-light:#F5EAE7;
  --cream:#F7F5F0;--cream-dark:#EDE9E2;
  --text:#1A1A18;--text2:#4A4A47;--text3:#888780;
  --border:#E0DED8;--card:#fff;
  --green-bg:#EAF3DE;--green-t:#27500A;--green-b:#3B6D11;
  --red-bg:#FCEBEB;--red-t:#791F1F;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --blue-bg:#E6F1FB;--blue-t:#0C447C;
}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

.topbar{background:var(--teal);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Raleway',sans-serif;font-size:16px;font-weight:700;color:#fff}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-bar-bg{width:120px;height:6px;background:rgba(255,255,255,.2);border-radius:3px}
.prog-bar-fill{height:6px;border-radius:3px;background:#fff;transition:width .4s ease}
.prog-label{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap}

.info-bar{background:#fff;border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:10px;justify-content:center}
.info-bar label{font-size:12.5px;color:var(--text3);font-weight:600}
.info-bar input{border:1px solid var(--border);border-radius:8px;padding:.35rem .7rem;font-size:13px;font-family:'Lato',sans-serif;width:200px}
.info-bar input:focus{outline:none;border-color:var(--teal-mid)}

.print-header{display:none}

.shell{max-width:780px;margin:0 auto;padding:2rem 1rem 5rem}
.section-intro{text-align:center;padding:1.5rem 0 1.5rem}
.section-intro h2{font-family:'Raleway',sans-serif;font-size:22px;font-weight:700;color:var(--teal);margin-bottom:.4rem}
.section-intro p{font-size:14px;color:var(--text3);max-width:520px;margin:0 auto}

.phase-nav{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.phase-tab{flex:1;padding:.75rem .5rem;text-align:center;cursor:pointer;border:none;background:transparent;font-family:'Lato',sans-serif;font-size:13px;font-weight:600;color:var(--text3);transition:all .2s;border-right:1px solid var(--border)}
.phase-tab:last-child{border-right:none}
.phase-tab.active{background:var(--teal);color:#fff}
.phase-tab .tab-num{display:block;font-size:18px;font-weight:700;margin-bottom:2px}
.phase-tab .tab-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em}

.rule-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:1.5rem;padding:1.5rem}
.rule-title{font-family:'Raleway',sans-serif;font-size:20px;font-weight:700;color:var(--teal);margin-bottom:.6rem}
.rule-def{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:.9rem}
.example-list{display:flex;flex-direction:column;gap:.5rem;margin-top:.25rem}
.ex-item{background:var(--cream);border-radius:8px;padding:.65rem .9rem;font-size:13px;color:var(--text2);line-height:1.5;border-left:3px solid var(--teal-mid)}
.ex-item strong{color:var(--teal-dark);font-weight:700}
.confusion-box{background:var(--amber-bg);border-left:3px solid #BA7517;border-radius:0 8px 8px 0;padding:.7rem 1rem;margin:.75rem 0}
.confusion-box .cb-title{font-size:11px;font-weight:700;color:var(--amber-t);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.confusion-box p{font-size:13px;color:var(--amber-t);line-height:1.55}
.tip-box{background:var(--blue-bg);border-radius:8px;padding:.65rem .9rem;margin-top:.75rem;font-size:13px;color:var(--blue-t);line-height:1.5}
.wc-def-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:.9rem 0 .35rem}

.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
.quiz-num{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}
.quiz-situation{background:var(--teal-light);border-left:3px solid var(--teal-mid);border-radius:0 8px 8px 0;padding:.6rem .9rem;font-size:13px;color:var(--teal-dark);margin-bottom:1rem}
.quiz-prompt{font-size:15px;font-weight:600;color:var(--text);margin-bottom:1rem;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:7px}
.q-opt{display:flex;align-items:flex-start;gap:10px;padding:.7rem 1rem;border:1px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;text-align:left;width:100%;font-family:'Lato',sans-serif}
.q-opt:hover{border-color:#9FE1CB;background:var(--teal-light)}
.q-opt.correct,.q-opt.revealed{border-color:var(--green-b);background:var(--green-bg)}
.q-opt.incorrect{border-color:#E24B4A;background:var(--red-bg)}
.q-letter{min-width:22px;height:22px;border-radius:50%;border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-opt.correct .q-letter,.q-opt.revealed .q-letter{background:var(--green-b);border-color:var(--green-b);color:#fff}
.q-opt.incorrect .q-letter{background:#E24B4A;border-color:#E24B4A;color:#fff}
.q-text{font-size:14px;color:var(--text);line-height:1.5}
.quiz-feedback{margin-top:.75rem;padding:.65rem .9rem;border-radius:8px;font-size:13px;line-height:1.5;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:var(--green-bg);color:var(--green-t);border-left:3px solid var(--green-b)}
.quiz-feedback.incorrect{background:var(--red-bg);color:var(--red-t);border-left:3px solid #E24B4A}

.write-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
.write-word-tag{display:inline-block;font-family:'Raleway',sans-serif;font-size:16px;font-weight:700;color:var(--teal);background:var(--teal-light);padding:4px 16px;border-radius:20px;margin-bottom:.75rem;border:1px solid #9FE1CB}
.write-reminder{background:var(--cream);border-radius:8px;padding:.6rem .9rem;font-size:12px;color:var(--text3);margin-bottom:1rem;line-height:1.5}
.write-ta{width:100%;min-height:80px;border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;font-size:14px;color:var(--text);font-family:'Lato',sans-serif;resize:vertical;outline:none;background:var(--cream);line-height:1.6}
.write-ta:focus{border-color:var(--teal-mid);background:#fff}
.print-mirror{display:none}

.export-box{background:var(--teal-light);border:1.5px dashed var(--teal-mid);border-radius:14px;padding:1.4rem;text-align:center;margin:1.5rem 0}
.export-box p{font-size:13px;color:var(--teal-dark);margin-bottom:.8rem}
.export-btn{background:var(--teal);color:#fff;border:none;padding:.7rem 1.6rem;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif}
.export-btn:hover{background:var(--teal-mid)}

.bottom-nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.nav-btn{padding:.6rem 1.4rem;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Lato',sans-serif;border:1px solid var(--border);background:var(--card);color:var(--text)}
.nav-btn:hover{border-color:var(--teal-mid)}
.nav-btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}

@media print{
  .topbar,.info-bar,.phase-nav,.bottom-nav,.export-box{display:none !important}
  #phase-0{display:none !important}
  #phase-1,#phase-2{display:block !important}
  .write-ta{display:none !important}
  .print-mirror{display:block !important;white-space:pre-wrap;border:1px solid #999;border-radius:8px;padding:.6rem .85rem;font-size:12.5px;color:#000;background:#fff;margin-top:.2rem}
  .print-header{display:block !important;padding:0 0 1rem;font-family:'Lato',sans-serif}
  .print-header h1{font-family:'Raleway',sans-serif;font-size:19px;color:#085041;margin-bottom:.3rem}
  .print-header .ph-meta{font-size:12px;color:#444}
  body{background:#fff}
  .shell{padding:1rem 1rem 2rem;max-width:100%}
  .quiz-card,.write-card{box-shadow:none;break-inside:avoid;border:1px solid #ccc}
  .q-opt.correct,.q-opt.revealed,.q-opt.incorrect{border-width:2px !important}
  .section-intro p{display:none}
}
@media(max-width:580px){.shell{padding:1.5rem .75rem 5rem}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Grammar Builder — Week 9</div>
    <div class="topbar-sub">English with Ali · Purpose &amp; Joining Ideas</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog" style="width:0%"></div></div>
    <span class="prog-label" id="prog-label">Phase 1 of 3</span>
  </div>
</div>

<div class="info-bar">
  <label for="student-name">Your name:</label>
  <input type="text" id="student-name" placeholder="Jessi">
</div>

<div class="print-header" id="print-header"></div>

<div class="shell">
  <div class="phase-nav">
    <div class="phase-tab active" id="tab-0" onclick="goPhase(0)"><span class="tab-num">1</span><span class="tab-lbl">Learn</span></div>
    <div class="phase-tab" id="tab-1" onclick="goPhase(1)"><span class="tab-num">2</span><span class="tab-lbl">Quiz</span></div>
    <div class="phase-tab" id="tab-2" onclick="goPhase(2)"><span class="tab-num">3</span><span class="tab-lbl">Write</span></div>
  </div>

  <div id="phase-0"></div>
  <div id="phase-1" style="display:none"></div>
  <div id="phase-2" style="display:none"></div>
</div>

<script>
const QUIZ = [
  {id:'q1',situation:'You scheduled a call with your team.',prompt:'Which sentence correctly explains why?',
    options:['I scheduled the call for discuss the new policy.','I scheduled the call to discuss the new policy.','I scheduled the call to discussing the new policy.','I scheduled the call for the discuss the new policy.'],
    correct:1,explain:'"To + base verb" (discuss) expresses purpose. Never "for + verb," and never "to + verb-ing."'},
  {id:'q2',situation:'A colleague asks why you sent an email at midnight.',prompt:'Which sentence is correct?',
    options:['I sent it for inform the client before their morning.','I sent it to inform the client before their morning.','I sent it for informing the client before their morning.','I sent it to informing the client before their morning.'],
    correct:1,explain:'Same rule: "to inform" — base verb after "to" when explaining purpose.'},
  {id:'q3',situation:'You\'re describing two facts about a colleague.',prompt:'Which sentence is correctly punctuated?',
    options:['He manages the regional team, he reports directly to the VP.','He manages the regional team. He reports directly to the VP.','He manages the regional team he reports directly to the VP.','He manages, the regional team reports directly to the VP.'],
    correct:1,explain:'Two complete sentences need a period (or a conjunction). Option A is a comma splice; C is a run-on; D misplaces the comma.'},
  {id:'q4',situation:'Explaining your daily routine to a new colleague.',prompt:'Which version avoids a comma splice?',
    options:['I check my email, I respond to urgent items, I start my first meeting.','I check my email, respond to urgent items, and start my first meeting.','I check my email I respond to urgent items I start my first meeting.','I check my email; I respond to urgent items, I start my first meeting.'],
    correct:1,explain:'Option B works because it\'s one subject ("I") with three verbs in a list — no repeated subject, no splice. A and D join full independent clauses with just commas.'},
  {id:'q5',situation:'A stakeholder asks why your team built a new dashboard.',prompt:'Which sentence is correct?',
    options:['We built it for track performance more easily.','We built it to track performance more easily.','We built it to tracking performance more easily.','We built it for track performance, more easily.'],
    correct:1,explain:'"To track" — base verb after "to" for purpose.'},
  {id:'q6',situation:'You\'re writing a project update.',prompt:'Which sentence is both correctly punctuated AND uses the right structure for purpose?',
    options:['We held a workshop, for align all departments on the new process.','We held a workshop to align all departments on the new process.','We held a workshop, to align all departments on the new process, and to training the new team members.','We held a workshop align all departments on the new process.'],
    correct:1,explain:'Combines both target rules: "to + base verb," with no unnecessary comma before it.'},
  {id:'q7',situation:'Summarizing a client interaction.',prompt:'Which version is correct?',
    options:['The client called with a question, I escalated it to my supervisor.','The client called with a question, and I escalated it to my supervisor.','The client called with a question I escalated it to my supervisor.','The client called, with a question I escalated it to my supervisor.'],
    correct:1,explain:'A conjunction ("and") is needed to join the two independent clauses. A is a splice, C is a run-on, D misplaces the comma.'},
];

const WRITE_TASKS = [
  {word:'TO + verb',prompt:'Write a sentence explaining WHY you do something in your job. Use "to + verb."',hint:'Try: "I [verb] ... to [verb] ..."'},
  {word:'Joining ideas',prompt:'Write two complete sentences about your team or a colleague. Then join them correctly — using a period, "and," or a connector like "because."',hint:'First write both ideas, then check: can each one stand alone?'},
  {word:'Both together',prompt:'Write a short paragraph (3–4 sentences) describing a process at work. Use at least one "to + verb" for purpose, and make sure you have no comma splices.',hint:'Read each sentence out loud — if it sounds like two ideas stuck together, fix the punctuation.'},
];

let currentPhase = 0;
const quizAnswers = {};
const writeAnswers = {};

function updateProgress(){
  const phases = ['Phase 1 of 3 — Learn','Phase 2 of 3 — Quiz','Phase 3 of 3 — Write'];
  const pcts = [33,66,100];
  document.getElementById('prog').style.width = pcts[currentPhase] + '%';
  document.getElementById('prog-label').textContent = phases[currentPhase];
}

function goPhase(n){
  document.getElementById('phase-' + currentPhase).style.display = 'none';
  document.querySelectorAll('.phase-tab').forEach((t,i) => t.classList.toggle('active', i === n));
  currentPhase = n;
  document.getElementById('phase-' + n).style.display = 'block';
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
  if(n === 1) renderQuiz();
  if(n === 2) renderWrite();
}

function renderLearn(){
  const el = document.getElementById('phase-0');
  el.innerHTML = `
  <div class="section-intro"><h2>Phase 1 — Learn the Rules</h2><p>Two patterns from your speaking and writing this week. Read carefully — these are the focus of today's quiz and writing.</p></div>

  <div class="rule-card">
    <div class="rule-title">TO + verb — explaining WHY</div>
    <div class="rule-def">When you explain the reason you do something — the purpose — English uses <strong>"to + base verb."</strong> Never "for + verb" for this meaning. "For" is used before a noun or a person ("for the meeting," "for my manager"), not before a verb explaining a reason.</div>
    <div class="wc-def-label">Examples</div>
    <div class="example-list">
      <div class="ex-item">"I coordinate the meeting <strong>to review</strong> the report."</div>
      <div class="ex-item">"She called him <strong>to explain</strong> the changes."</div>
      <div class="ex-item">"We scheduled the call <strong>to discuss</strong> the budget."</div>
    </div>
    <div class="confusion-box"><div class="cb-title">⚠️ Don't confuse this</div><p>✗ "for review / for discuss / for communicate" → ✓ "to review / to discuss / to communicate." Spanish "para + infinitivo" often gets translated word-for-word as "for + verb," but English needs "to + verb" here.</p></div>
    <div class="tip-box">💡 Ask yourself "why do I do this?" — the answer always starts with "to," never "for," when a verb follows.</div>
  </div>

  <div class="rule-card">
    <div class="rule-title">Joining ideas — avoiding comma splices</div>
    <div class="rule-def">A <strong>comma splice</strong> happens when two complete sentences (each with their own subject and verb) are joined with only a comma. English needs a period, a conjunction (and/but/so), or a connector (because/before/after/when) to join them correctly.</div>
    <div class="wc-def-label">Examples</div>
    <div class="example-list">
      <div class="ex-item">✗ "He works with finance, his team is from other countries."</div>
      <div class="ex-item">✓ "He works with finance. His team is from other countries." <em>(period)</em></div>
      <div class="ex-item">✓ "He works with finance, and his team is from other countries." <em>(conjunction)</em></div>
    </div>
    <div class="confusion-box"><div class="cb-title">⚠️ Don't confuse this</div><p>A comma alone is NOT strong enough to connect two full sentences. Quick test: can each half stand alone as its own sentence? If yes, a comma alone is not enough.</p></div>
    <div class="tip-box">💡 Read each half separately — if both work as a stand-alone sentence, you need more than just a comma between them.</div>
  </div>

  <div class="bottom-nav"><span style="font-size:13px;color:var(--text3)">2 rules covered</span><button class="nav-btn primary" onclick="goPhase(1)">Continue to Quiz →</button></div>`;
}

function renderQuiz(){
  const el = document.getElementById('phase-1');
  let html = `<div class="section-intro"><h2>Phase 2 — Quiz</h2><p>Read each situation and choose the best answer.</p></div>`;

  QUIZ.forEach((q,qi) => {
    const answered = quizAnswers[q.id] !== undefined;
    html += `<div class="quiz-card"><div class="quiz-num">Question ${qi+1} of ${QUIZ.length}</div>
      <div class="quiz-situation"><strong>Situation:</strong> ${q.situation}</div>
      <div class="quiz-prompt">${q.prompt}</div><div class="quiz-options">`;
    q.options.forEach((opt,oi) => {
      let cls = '';
      if(answered){ if(oi === q.correct) cls = 'revealed'; else if(quizAnswers[q.id] === oi) cls = 'incorrect'; }
      html += `<button class="q-opt ${cls}" data-qid="${q.id}" data-oi="${oi}" onclick="answerQuiz(this)"><span class="q-letter">${String.fromCharCode(65+oi)}</span><span class="q-text">${opt}</span></button>`;
    });
    html += `</div>`;
    if(answered){
      const correct = quizAnswers[q.id] === q.correct;
      html += `<div class="quiz-feedback ${correct?'correct':'incorrect'} show">${correct?'✓ ':'✗ '}${q.explain}</div>`;
    }
    html += `</div>`;
  });

  const allDone = Object.keys(quizAnswers).length === QUIZ.length;
  html += `<div class="bottom-nav"><button class="nav-btn" onclick="goPhase(0)">← Back to Learn</button><button class="nav-btn primary" onclick="goPhase(2)" ${allDone?'':'disabled'}>Continue to Write →</button></div>`;
  el.innerHTML = html;
}

function answerQuiz(btn){
  const qid = btn.dataset.qid, oi = parseInt(btn.dataset.oi);
  if(quizAnswers[qid] !== undefined) return;
  quizAnswers[qid] = oi;
  renderQuiz();
}

function renderWrite(){
  const el = document.getElementById('phase-2');
  let html = `<div class="section-intro"><h2>Phase 3 — Write in Context</h2><p>Apply both rules to real sentences about your own work.</p></div>`;

  WRITE_TASKS.forEach((task,ti) => {
    const val = writeAnswers[ti] || '';
    html += `<div class="write-card"><span class="write-word-tag">${task.word}</span>
      <div class="write-reminder"><strong>Prompt:</strong> ${task.prompt}</div>
      ${task.hint?`<div style="font-size:12px;color:var(--text3);margin-bottom:.75rem;font-style:italic">💭 ${task.hint}</div>`:''}
      <textarea class="write-ta" id="wta-${ti}" placeholder="Write here…" oninput="writeAnswers[${ti}]=this.value">${escHtml(val)}</textarea>
      <div class="print-mirror" id="mirror-wta-${ti}"></div>
    </div>`;
  });

  html += `<div class="export-box"><p>📄 Done? Export this whole activity — quiz and written answers — as a clean PDF to submit.</p><button class="export-btn" onclick="exportPDF()">Export to PDF</button></div>`;
  html += `<div class="bottom-nav"><button class="nav-btn" onclick="goPhase(1)">← Back to Quiz</button><button class="nav-btn" onclick="goPhase(0)">Restart ↺</button></div>`;
  el.innerHTML = html;
}

function escHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function exportPDF(){
  const name = document.getElementById('student-name').value.trim() || '_____________';
  const dateStr = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  document.getElementById('print-header').innerHTML = `<h1>Grammar Builder — Week 9: Purpose &amp; Joining Ideas</h1><div class="ph-meta"><strong>Student:</strong> ${escHtml(name)} &nbsp;|&nbsp; <strong>Date:</strong> ${dateStr}</div>`;

  renderQuiz();
  renderWrite();

  WRITE_TASKS.forEach((t,ti) => {
    const mirror = document.getElementById('mirror-wta-' + ti);
    if(mirror) mirror.textContent = writeAnswers[ti] && writeAnswers[ti].trim() ? writeAnswers[ti] : '(not answered yet)';
  });

  window.print();
}

renderLearn();
updateProgress();
</script>
</body>
</html>
